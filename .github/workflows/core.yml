name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD AND TEST
  # ─────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Pipeline Config
        id: config
        run: |
          pip install pyyaml
          FRONTEND=$(python3 -c "import yaml; c=yaml.safe_load(open('pipeline-config.yml')); print(str(c['features']['frontend']).lower())")
          BACKEND=$(python3 -c "import yaml; c=yaml.safe_load(open('pipeline-config.yml')); print(str(c['features']['backend']).lower())")
          TEST=$(python3 -c "import yaml; c=yaml.safe_load(open('pipeline-config.yml')); print(str(c['features']['test']).lower())")
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "backend=$BACKEND" >> $GITHUB_OUTPUT
          echo "test=$TEST" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.config.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Frontend
        if: steps.config.outputs.frontend == 'true'
        run: |
          echo "Building React frontend..."
          cd frontend
          npm install
          npm run build
          echo "✅ Frontend built successfully"

      - name: Setup Python
        if: steps.config.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Backend
        if: steps.config.outputs.backend == 'true'
        run: |
          echo "Building FastAPI backend..."
          cd backend
          pip install -r requirements.txt
          echo "✅ Backend built successfully"

      - name: Run Tests
        if: steps.config.outputs.test == 'true'
        run: |
          echo "Running backend tests..."
          cd backend
          pip install -r requirements.txt
          pytest tests/ -v
          echo "✅ All tests passed"

  # ─────────────────────────────────────────
  # JOB 2: DOCKER BUILD
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Docker Config
        id: config
        run: |
          pip install pyyaml
          DOCKER=$(python3 -c "import yaml; c=yaml.safe_load(open('pipeline-config.yml')); print(str(c['features']['docker']).lower())")
          echo "docker=$DOCKER" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        if: steps.config.outputs.docker == 'true'
        run: |
          echo "Building Docker image..."
          docker build -t my-cicd-app .
          echo "✅ Docker image built successfully"

  # ─────────────────────────────────────────
  # JOB 3: PIPELINE SUMMARY
  # ─────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Print Summary
        run: |
          echo "🚀 Pipeline completed successfully!"
          echo "──────────────────────────────────"
          echo "✅ Code checked out"
          echo "✅ Frontend built"
          echo "✅ Backend built"
          echo "✅ Tests passed"
          echo "✅ Docker image built"
          echo "──────────────────────────────────"
          echo "Your app is ready!"
